  <text x="632" y="30" fill="#FF0080" opacity=".5">S</text>
  <text x="632" y="45" fill="#FF0080" opacity=".3">H</text>
</g>
<g class="r" style="animation-duration:5.5s;animation-delay:1.2s">
  <text x="660" y="0" fill="#BF00FF">A</text>
  <text x="660" y="15" fill="#BF00FF" opacity=".7">N</text>
  <text x="660" y="30" fill="#BF00FF" opacity=".5">S</text>
  <text x="660" y="45" fill="#BF00FF" opacity=".3">I</text>
  <text x="660" y="60" fill="#BF00FF" opacity=".15">B</text>
</g>
<g class="r" style="animation-duration:3.6s;animation-delay:1.0s">
  <text x="688" y="0" fill="#00E5FF">N</text>
  <text x="688" y="15" fill="#00E5FF" opacity=".7">G</text>
  <text x="688" y="30" fill="#00E5FF" opacity=".5">I</text>
  <text x="688" y="45" fill="#00E5FF" opacity=".3">N</text>
  <text x="688" y="60" fill="#00E5FF" opacity=".15">X</text>
</g>
<g class="r" style="animation-duration:4.4s;animation-delay:2.3s">
  <text x="716" y="0" fill="#FF0080">V</text>
  <text x="716" y="15" fill="#FF0080" opacity=".7">A</text>
  <text x="716" y="30" fill="#FF0080" opacity=".5">U</text>
  <text x="716" y="45" fill="#FF0080" opacity=".3">L</text>
  <text x="716" y="60" fill="#FF0080" opacity=".15">T</text>
</g>
<g class="r" style="animation-duration:3.9s;animation-delay:1.6s">
  <text x="744" y="0" fill="#BF00FF">コ</text>
  <text x="744" y="15" fill="#BF00FF" opacity=".6">サ</text>
