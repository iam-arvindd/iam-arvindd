  <text x="66" y="15" fill="#BF00FF" opacity=".7">W</text>
  <text x="66" y="30" fill="#BF00FF" opacity=".5">S</text>
</g>
<g class="r" style="animation-duration:5.1s;animation-delay:2.2s">
