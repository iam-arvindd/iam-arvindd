  <text x="848" y="45" fill="#00E5FF" opacity=".3">0</text>
</g>

<!-- Skyline silhouette -->
<path d="M0,200 L0,172 L18,172 L18,158 L28,158 L28,148 L38,148 L38,158 L48,158 L48,170
         L65,170 L65,152 L73,152 L73,138 L78,138 L78,132 L83,132 L83,138 L88,138 L88,152 L100,152 L100,170
         L118,170 L118,160 L128,160 L128,148 L138,148 L138,160 L150,160 L150,172
         L168,172 L168,162 L178,162
         L680,162 L680,172
         L698,172 L698,160 L710,160 L710,148 L720,148 L720,160 L730,160 L730,172
         L745,172 L745,152 L753,152 L753,138 L758,138 L758,132 L763,132 L763,138 L768,138 L768,152 L778,152 L778,172
         L795,172 L795,160 L807,160 L807,148 L817,148 L817,160 L828,160 L828,172
         L842,172 L842,158 L860,158 L860,200 Z"
fill="#00E5FF" opacity="0.13"/>

<!-- Small window lights on skyline -->
<rect x="80" y="134" width="3" height="3" fill="#FF0080" opacity="0.9">
  <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.1s" repeatCount="indefinite"/>
</rect>
<rect x="760" y="134" width="3" height="3" fill="#FF0080" opacity="0.9">
  <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/>
</rect>
<rect x="130" y="150" width="3" height="3" fill="#00E5FF" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.7s" repeatCount="indefinite"/>
</rect>
<rect x="712" y="150" width="3" height="3" fill="#BF00FF" opacity="0.8">
  <animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.1s" repeatCount="indefinite"/>
</rect>

<!-- Corner brackets -->
<g class="c">
  <line x1="8" y1="8" x2="32" y2="8" stroke="#FF0080" stroke-width="2.5"/>
  <line x1="8" y1="8" x2="8" y2="32" stroke="#FF0080" stroke-width="2.5"/>
  <line x1="852" y1="8" x2="828" y2="8" stroke="#00E5FF" stroke-width="2.5"/>
  <line x1="852" y1="8" x2="852" y2="32" stroke="#00E5FF" stroke-width="2.5"/>
  <line x1="8" y1="192" x2="32" y2="192" stroke="#00E5FF" stroke-width="2.5"/>
  <line x1="8" y1="192" x2="8" y2="168" stroke="#00E5FF" stroke-width="2.5"/>
  <line x1="852" y1="192" x2="828" y2="192" stroke="#FF0080" stroke-width="2.5"/>
  <line x1="852" y1="192" x2="852" y2="168" stroke="#FF0080" stroke-width="2.5"/>
</g>

<!-- ARVIND glow layer (blurred duplicate for glow effect) -->
<text x="430" y="118" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="82" font-weight="900" letter-spacing="14"
  fill="#FF0080" opacity="0.2" filter="url(#softglow)" class="gl">ARVIND</text>
<text x="430" y="118" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="82" font-weight="900" letter-spacing="14"
  fill="#00E5FF" opacity="0.15" filter="url(#softglow)" class="gl">ARVIND</text>

<!-- ARVIND main text with animated gradient + glitch -->
<text x="430" y="118" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="82" font-weight="900" letter-spacing="14"
  fill="url(#lg)" class="t" filter="url(#glow)">ARVIND</text>

<!-- Subtitle -->
<text x="430" y="152" text-anchor="middle"
  font-family="'Courier New',monospace" font-size="13" font-weight="700"
  fill="#00E5FF" letter-spacing="9" class="s">DEVOPS ENGINEER</text>

<!-- Blinking cursor -->
<rect x="598" y="138" width="8" height="14" fill="#FF0080" rx="1">
  <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- Animated bottom bar -->
<g clip-path="url(#barclip)">
  <rect x="-860" y="195" width="1720" height="5" fill="url(#bargrad)">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="860,0" dur="2.5s" repeatCount="indefinite"/>
  </rect>
</g>
</svg>
