  <text x="772" y="60" fill="#00E5FF" opacity=".15">O</text>
</g>
<g class="r" style="animation-duration:6.0s;animation-delay:3.1s">
  <text x="800" y="0" fill="#FF0080">T</text>
  <text x="800" y="15" fill="#FF0080" opacity=".7">E</text>
