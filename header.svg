<g class="r" style="animation-duration:4.0s;animation-delay:0.4s">
  <text x="122" y="0" fill="#FF0080">H</text>
  <text x="122" y="15" fill="#FF0080" opacity=".7">E</text>
  <text x="122" y="30" fill="#FF0080" opacity=".5">L</text>
  <text x="122" y="45" fill="#FF0080" opacity=".3">M</text>
</g>
<g class="r" style="animation-duration:3.5s;animation-delay:1.9s">
  <text x="150" y="0" fill="#BF00FF">G</text>
  <text x="150" y="15" fill="#BF00FF" opacity=".7">I</text>
  <text x="150" y="30" fill="#BF00FF" opacity=".5">T</text>
</g>
<g class="r" style="animation-duration:4.9s;animation-delay:0.8s">
  <text x="178" y="0" fill="#00E5FF">L</text>
  <text x="178" y="15" fill="#00E5FF" opacity=".7">I</text>
  <text x="178" y="30" fill="#00E5FF" opacity=".5">N</text>
  <text x="178" y="45" fill="#00E5FF" opacity=".3">U</text>
  <text x="178" y="60" fill="#00E5FF" opacity=".15">X</text>
</g>
<g class="r" style="animation-duration:3.7s;animation-delay:2.8s">
  <text x="206" y="0" fill="#FF0080">ア</text>
  <text x="206" y="15" fill="#FF0080" opacity=".6">イ</text>
  <text x="206" y="30" fill="#FF0080" opacity=".4">ウ</text>
</g>
<g class="r" style="animation-duration:4.3s;animation-delay:1.1s">
  <text x="234" y="0" fill="#BF00FF">J</text>
  <text x="234" y="15" fill="#BF00FF" opacity=".7">E</text>
  <text x="234" y="30" fill="#BF00FF" opacity=".5">N</text>
  <text x="234" y="45" fill="#BF00FF" opacity=".3">K</text>
</g>

<!-- ====== MATRIX RAIN - RIGHT SIDE ====== -->
<g class="r" style="animation-duration:4.2s;animation-delay:0.5s">
  <text x="604" y="0" fill="#BF00FF">エ</text>
  <text x="604" y="15" fill="#BF00FF" opacity=".6">オ</text>
  <text x="604" y="30" fill="#BF00FF" opacity=".4">カ</text>
</g>
