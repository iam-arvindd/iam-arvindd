<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.r{font-family:'Courier New',monospace;font-size:12px;font-weight:700;animation:fall linear infinite;opacity:0}
@keyframes fall{0%{transform:translateY(-80px);opacity:0}8%{opacity:1}80%{opacity:.5}100%{transform:translateY(220px);opacity:0}}
.t{animation:glitch 8s infinite}
@keyframes glitch{0%,85%,94%,100%{transform:translate(0,0)}86%{transform:translate(-4px,0)}88%{transform:translate(4px,1px)}90%{transform:translate(-2px,-2px)}92%{transform:translate(3px,0)}}
.s{animation:spulse 2.5s ease-in-out infinite}
@keyframes spulse{0%,100%{opacity:.75}50%{opacity:1}}
.c{animation:cpulse 2s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:.5}50%{opacity:1}}
.gl{animation:glowanim 3s ease-in-out infinite}
@keyframes glowanim{0%,100%{opacity:.3}50%{opacity:.7}}
</style>

<!-- Animated gradient for ARVIND -->
<linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"><animate attributeName="stop-color" values="#FF0080;#BF00FF;#00E5FF;#FF0080" dur="3s" repeatCount="indefinite"/></stop>
  <stop offset="50%"><animate attributeName="stop-color" values="#BF00FF;#00E5FF;#FF0080;#BF00FF" dur="3s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#00E5FF;#FF0080;#BF00FF;#00E5FF" dur="3s" repeatCount="indefinite"/></stop>
</linearGradient>

<!-- Glow blur filter -->
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="4" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="8" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>

<!-- Bottom bar gradient -->
<linearGradient id="bargrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="transparent"/>
  <stop offset="25%" stop-color="#FF0080"/>
  <stop offset="50%" stop-color="#BF00FF"/>
  <stop offset="75%" stop-color="#00E5FF"/>
  <stop offset="100%" stop-color="transparent"/>
</linearGradient>

<!-- Clip for bottom bar -->
<clipPath id="barclip"><rect x="0" y="195" width="860" height="5"/></clipPath>
</defs>

<!-- Black background -->
<rect width="860" height="200" fill="#000000"/>

<!-- Subtle grid lines -->
<g opacity="0.08" stroke-width="0.4">
  <line x1="0" y1="50" x2="860" y2="50" stroke="#00E5FF"/>
  <line x1="0" y1="100" x2="860" y2="100" stroke="#FF0080"/>
  <line x1="0" y1="150" x2="860" y2="150" stroke="#00E5FF"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="#00E5FF"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="#FF0080"/>
  <line x1="660" y1="0" x2="660" y2="200" stroke="#FF0080"/>
  <line x1="760" y1="0" x2="760" y2="200" stroke="#00E5FF"/>
</g>

<!-- ====== MATRIX RAIN - LEFT SIDE ====== -->
<g class="r" style="animation-duration:3.8s;animation-delay:0s">
  <text x="14" y="0" fill="#00E5FF">D</text>
  <text x="14" y="15" fill="#00E5FF" opacity=".7">O</text>
  <text x="14" y="30" fill="#00E5FF" opacity=".5">C</text>
  <text x="14" y="45" fill="#00E5FF" opacity=".3">K</text>
  <text x="14" y="60" fill="#00E5FF" opacity=".15">E</text>
</g>
<g class="r" style="animation-duration:4.5s;animation-delay:1.3s">
  <text x="40" y="0" fill="#FF0080">K</text>
  <text x="40" y="15" fill="#FF0080" opacity=".7">8</text>
  <text x="40" y="30" fill="#FF0080" opacity=".5">S</text>
</g>
<g class="r" style="animation-duration:3.2s;animation-delay:0.6s">
